    <script>
        function toArtistPage() {
            window.open("https://push.fm/fl/averyocean65", "_blank");
        }

        function toggleStreamingServices() {
            const toToggle = document.getElementById("streaming-service-embeds");
            const button = document.getElementById("show-streaming-embeds-btn");
            
            if(toToggle.style.display === "block") {
                toToggle.style.display = "none";
                button.innerText = "Show Embeds";
            }
            else {
                toToggle.style.display = "block";
                button.innerText = "Hide Embeds";
            }
        }
    </script>
